<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oinodion - Greek Wines</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2 family=Cinzel:wght@700;900&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR (z lupą, linią wyszukiwania i przełącznikiem języka) -->
    <header>
        <div class="logo">Oinodion</div>
        
        <nav>
            <ul>
                <li><a href="#">Our Vines</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>

        <!-- Elegancka linia wyszukiwania z lupą (zamiast explore) -->
        <div class="search-container">
            <input type="text" class="search-input" placeholder="Search our cellar...">
            <button class="search-icon" aria-label="Search">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M11.5 11.5L15 15M13 7C13 10.3137 10.3137 13 7 13C3.68629 13 1 10.3137 1 7C1 3.68629 3.68629 1 7 1C10.3137 1 13 3.68629 13 7Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>

        <!-- Prawa strona: Języki i koszyk blisko siebie -->
        <div class="right-nav-block">
            <div class="lang-switcher">
                <span class="active">EN</span>
                <span class="lang-divider">|</span>
                <span>GR</span>
            </div>
            <div class="nav-buttons">
                <button class="btn-nav primary">Cart (0)</button>
            </div>
        </div>
    </header>

    <!-- HERO SECTION (Tło #002d62 gwarantuje, że napisy są widoczne, a obrazek jest po prawej) -->
    <div class="hero-section">
        <div class="greek-border-wrap">
            <main class="hero-grid">
                
                <!-- Lewa Kolumna: Teksty -->
                <div class="hero-content">
                    <h1>Wine made the ancient way</h1>
                    <p>We curate rare, high-altitude Greek vintages from volcanic Santorini and old-vine Naoussa. Handcrafted with millennia of tradition, tailored for the modern connoisseur. Each bottle holds a legacy worth sharing.</p>
                    <div class="hero-actions">
                        <button class="btn-hero dark">Shop now</button>
                        <button class="btn-hero transparent">Learn more</button>
                    </div>
                </div>
                
                <!-- Prawa Kolumna: Twój obrazek z pliku image_1c767d.jpg -->
                <div class="hero-image-container">
                    <img src="wina.jpg" alt="Oinodion Greek Wine Art">
                </div>

            </main>
        </div>
    </div>

</body>
</html>
